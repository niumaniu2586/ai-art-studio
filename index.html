<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 创作工坊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; }
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); backdrop-filter: blur(5px); background: rgba(255,255,255,0.85); }
        .btn-primary { background: #6c5ce7; border: none; border-radius: 50px; padding: 10px 30px; }
        .btn-primary:hover { background: #5a4bd1; transform: scale(1.02); }
        .loading-spinner { display: none; text-align: center; margin: 20px 0; }
        .result-img { max-width: 100%; border-radius: 15px; margin-top: 15px; cursor: pointer; }
        .result-video { max-width: 100%; border-radius: 15px; margin-top: 15px; }
        .parameter-group { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .form-control, .form-select { border-radius: 10px; }
        h2 { color: #2d3436; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4" style="color: #2d3436;">✨ AI 创作工坊</h1>

        <!-- 图片生成 -->
        <div class="card p-4 mb-4">
            <h2>🖼️ 图片生成 <small class="text-muted" style="font-size: 1rem;">Seedream</small></h2>
            <form id="imageForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">描述词</label>
                            <input type="text" class="form-control" id="imgPrompt" placeholder="例如：一只赛博朋克风格的猫" required>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3 parameter-group">
                            <label class="form-label">图片尺寸</label>
                            <select class="form-select" id="imgSize">
                                <option value="1024x1024">1:1 (1024x1024)</option>
                                <option value="1920x1080">16:9 (1920x1080)</option>
                                <option value="1080x1920">9:16 (1080x1920)</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3 parameter-group">
                            <label class="form-label">生成数量</label>
                            <select class="form-select" id="imgCount">
                                <option value="1">1 张</option>
                                <option value="2">2 张</option>
                                <option value="3">3 张</option>
                                <option value="4">4 张</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">🚀 生成图片</button>
            </form>
            <div id="imgLoading" class="loading-spinner">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">AI 正在创作中，请稍候...</p>
            </div>
            <div id="imgResult" class="mt-3"></div>
        </div>

        <!-- 视频生成 -->
        <div class="card p-4 mb-4">
            <h2>🎬 视频生成 <small class="text-muted" style="font-size: 1rem;">Seedance</small></h2>
            <form id="videoForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">描述词</label>
                            <input type="text" class="form-control" id="vidPrompt" placeholder="例如：一只金毛犬在沙滩上奔跑" required>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3 parameter-group">
                            <label class="form-label">视频时长</label>
                            <select class="form-select" id="vidDuration">
                                <option value="5">5 秒</option>
                                <option value="10">10 秒</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3 parameter-group">
                            <label class="form-label">分辨率</label>
                            <select class="form-select" id="vidResolution">
                                <option value="720p">720p</option>
                                <option value="1080p">1080p</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">🎥 生成视频</button>
            </form>
            <div id="vidLoading" class="loading-spinner">
                <div class="spinner-border text-success" role="status"></div>
                <p class="mt-2">视频生成可能需要几分钟，请耐心等待...</p>
            </div>
            <div id="vidResult" class="mt-3"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 注意：下方 API_BASE 需要改成你后端服务器的地址，后面会说
        const API_BASE = "";

        // 图片生成
        document.getElementById('imageForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const prompt = document.getElementById('imgPrompt').value.trim();
            if (!prompt) return alert('请输入描述词');
            const size = document.getElementById('imgSize').value;
            const n = parseInt(document.getElementById('imgCount').value);

            const loading = document.getElementById('imgLoading');
            const resultDiv = document.getElementById('imgResult');
            loading.style.display = 'block';
            resultDiv.innerHTML = '';

            try {
                const response = await fetch(API_BASE + '/generate_image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, size, n })
                });
                const data = await response.json();
                if (data.error) {
                    resultDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                } else {
                    let html = '<div class="row">';
                    data.urls.forEach(url => {
                        html += `<div class="col-md-3 mb-3"><img src="${url}" class="result-img" onclick="window.open('${url}')" alt="生成图片"></div>`;
                    });
                    html += '</div>';
                    resultDiv.innerHTML = html;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="alert alert-danger">请求失败：${err.message}</div>`;
            } finally {
                loading.style.display = 'none';
            }
        });

        // 视频生成
        document.getElementById('videoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const prompt = document.getElementById('vidPrompt').value.trim();
            if (!prompt) return alert('请输入描述词');
            const duration = parseInt(document.getElementById('vidDuration').value);
            const resolution = document.getElementById('vidResolution').value;

            const loading = document.getElementById('vidLoading');
            const resultDiv = document.getElementById('vidResult');
            loading.style.display = 'block';
            resultDiv.innerHTML = '';

            try {
                const createRes = await fetch(API_BASE + '/generate_video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, duration, resolution })
                });
                const createData = await createRes.json();
                if (createData.error) {
                    resultDiv.innerHTML = `<div class="alert alert-danger">${createData.error}</div>`;
                    loading.style.display = 'none';
                    return;
                }
                const taskId = createData.task_id;

                let videoUrl = null;
                let attempts = 0;
                const maxAttempts = 180;
                resultDiv.innerHTML = `<div class="alert alert-info">⏳ 任务已提交，正在生成中 (任务ID: ${taskId})...</div>`;

                while (attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    attempts++;
                    const statusRes = await fetch(API_BASE + `/video_status/${taskId}`);
                    const statusData = await statusRes.json();
                    if (statusData.status === 'succeeded') {
                        videoUrl = statusData.video_url;
                        break;
                    } else if (statusData.status === 'failed') {
                        throw new Error('视频生成失败，请重试');
                    }
                    resultDiv.innerHTML = `<div class="alert alert-info">⏳ 正在生成中... (已等待 ${attempts*3} 秒)</div>`;
                }

                if (videoUrl) {
                    resultDiv.innerHTML = `
                        <div class="alert alert-success">✅ 生成成功！</div>
                        <video class="result-video" controls autoplay>
                            <source src="${videoUrl}" type="video/mp4">
                            您的浏览器不支持视频播放。
                        </video>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-warning">⏰ 生成超时，请稍后使用任务ID ${taskId} 查询状态。</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
